name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate tag is on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main

      - name: Require tagged commit on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build:
    name: Build ${{ matrix.platform }}
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            os: windows-latest
            script: npm run dist:win
            artifact: TeslaCam-Studio-Windows
          - platform: macOS
            os: macos-latest
            script: npm run dist:mac
            artifact: TeslaCam-Studio-macOS
          - platform: Linux
            os: ubuntu-latest
            script: npm run dist:linux
            artifact: TeslaCam-Studio-Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Static checks
        run: npm run check

      - name: Cross-file export regression test
        run: npm test

      - name: Build desktop app
        run: ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
